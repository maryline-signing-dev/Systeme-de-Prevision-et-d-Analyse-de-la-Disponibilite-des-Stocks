<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — SIPDS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="dashboard.html">
            <!-- <i class="bi bi-boxes me-1"></i> SIPDS -->
            <span>Prévision des Stocks</span>
        </a>
        <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
            <a class="nav-link text-white" href="produits.html">
                <i class="bi bi-grid-3x3-gap me-1"></i> Produits
            </a>
            <a class="nav-link text-white" href="prevision.html">
                <i class="bi bi-graph-up-arrow me-1"></i> Prévision
            </a>
            <span class="text-white small opacity-75">
                <i class="bi bi-person-circle me-1"></i>
                <span id="admin-name">Admin</span>
            </span>
            <button class="btn btn-outline-light btn-sm"
                    onclick="logout()">
                <i class="bi bi-box-arrow-right me-1"></i> Déconnexion
            </button>
        </div>
    </div>
</nav>

<!-- Contenu provisoire -->
<div class="container-fluid px-4 mt-5">
    <div class="text-center py-5">
        <i class="bi bi-check-circle-fill text-success"
           style="font-size:4rem;"></i>
        <h2 class="mt-3 fw-bold">Connexion réussie !</h2>
        <p class="text-muted">
            Le dashboard complet sera développé à l'Heure 7.
        </p>
        <p class="text-muted small">
            Admin connecté : <strong id="admin-email"></strong>
        </p>
        <a href="login.html" class="btn btn-outline-danger mt-3"
           onclick="logout(); return false;">
            <i class="bi bi-box-arrow-right me-1"></i> Se déconnecter
        </a>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    // Afficher l'email de l'admin
    const admin = getAdminInfo();
    const el    = document.getElementById('admin-email');
    if (el && admin) el.textContent = admin.email;
</script>

</body>
</html>
