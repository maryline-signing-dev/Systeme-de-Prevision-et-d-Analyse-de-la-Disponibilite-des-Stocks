<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — SIPDS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card card p-4 p-md-5">

        <div class="text-center mb-4">
            <div class="login-logo mb-2">
                <i class="bi bi-boxes"></i>
            </div>
            <h2 class="fw-bold text-dark">SIPDS</h2>
            <p class="text-muted small">
                Système de Prévision et d'Analyse<br>
                de la Disponibilité des Stocks
            </p>
        </div>

        <div id="alert-login"></div>

        <form id="login-form" novalidate>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">
                    <i class="bi bi-envelope me-1"></i> Adresse email
                </label>
                <input type="email"
                       class="form-control form-control-lg"
                       id="email"
                       placeholder="nom@domaine.extension"
                       autocomplete="email"
                       required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">
                    <i class="bi bi-lock me-1"></i> Mot de passe
                </label>
                <div class="input-group">
                    <input type="password"
                           class="form-control form-control-lg"
                           id="password"
                           placeholder="••••••••"
                           autocomplete="current-password"
                           required>
                    <button class="btn btn-outline-secondary"
                            type="button"
                            id="toggle-pwd">
                        <i class="bi bi-eye" id="eye-icon"></i>.
                    </button>
                </div>
            </div>

            <button type="submit"
                    class="btn btn-primary btn-lg w-100"
                    id="btn-login">
                <span id="btn-text">
                    <i class="bi bi-box-arrow-in-right me-1"></i>
                    Se connecter
                </span>
                <span id="btn-spinner" class="d-none">
                    <span class="spinner-border spinner-border-sm
                                 me-1"></span>
                    Connexion...
                </span>
            </button>

        </form>


    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>

<script>

    // Si déjà connecté → dashboard directement
    (function checkAlreadyLogged() {
        if (localStorage.getItem('access_token')) {
            window.location.href = '/dashboard';
        }
    })();

    // Afficher/masquer mot de passe
    document.getElementById('toggle-pwd')
        .addEventListener('click', () => {
            const input   = document.getElementById('password');
            const icon    = document.getElementById('eye-icon');
            const visible = input.type === 'text';
            input.type    = visible ? 'password' : 'text';
            icon.className = visible
                ? 'bi bi-eye'
                : 'bi bi-eye-slash';
        });

    // Soumission
    document.getElementById('login-form')
        .addEventListener('submit', async (e) => {
            e.preventDefault();

            const email    = document
                .getElementById('email').value.trim();
            const password = document
                .getElementById('password').value;

            if (!email || !password) {
                document.getElementById('alert-login').innerHTML = `
                    <div class="alert alert-warning small mb-3">
                        Veuillez remplir tous les champs.
                    </div>`;
                return;
            }

            // Spinner
            document.getElementById('btn-text')
                .classList.add('d-none');
            document.getElementById('btn-spinner')
                .classList.remove('d-none');
            document.getElementById('btn-login').disabled = true;

            // Appel API
            const result = await apiCall(
                '/auth/login', 'POST', { email, password }
            );

            // Réinitialiser bouton
            document.getElementById('btn-text')
                .classList.remove('d-none');
            document.getElementById('btn-spinner')
                .classList.add('d-none');
            document.getElementById('btn-login').disabled = false;

            if (result && result.success) {
                // Stocker token et infos
                localStorage.setItem(
                    'access_token',
                    result.data.access_token
                );
                localStorage.setItem(
                    'admin_info',
                    JSON.stringify(result.data.admin)
                );
                // Redirection
                window.location.href = '/dashboard';

            } else {
                const msg = result?.message
                    || 'Identifiants incorrects.';
                document.getElementById('alert-login').innerHTML = `
                    <div class="alert alert-danger
                                d-flex align-items-center mb-3">
                        <i class="bi bi-exclamation-triangle-fill
                                   me-2"></i>
                        <span>${msg}</span>
                    </div>`;
            }
        });

</script>
</body>
</html>
